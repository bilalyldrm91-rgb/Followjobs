<script>
const SB_URL='https://cvgxwpxvtxedajzrnand.supabase.co';
const SB_KEY='sb_publishable_cJp6p5cSfJwOynI5kCK_2Q_EPP4bijp';
const TG_TOKEN='8632000680:AAGZ_vVX8KJCsU7obXp63zgcNYmk4_5JNTs';

let sb,me=null,myProfile=null;
let tasks=[],profiles=[],teams=[];
let userStatus={}; // durum sistemi

async function init(){
  sb=supabase.createClient(SB_URL,SB_KEY);

  // BENİ HATIRLA
  const remember=localStorage.getItem('remember_me');
  if(remember==='1'){
    const {data:{session}}=await sb.auth.getSession();
    if(session){me=session.user;await showApp();}
    else showAuth();
  } else showAuth();

  sb.auth.onAuthStateChange(async(_,s)=>{
    if(s){me=s.user;await showApp();}
    else{me=null;showAuth();}
  });
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const remember=document.getElementById('remember-me')?.checked;

  if(remember) localStorage.setItem('remember_me','1');
  else localStorage.removeItem('remember_me');

  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error) alert('Hatalı giriş');
}

async function doLogout(){
  await sb.auth.signOut();
  localStorage.removeItem('remember_me');
  location.reload();
}

// PROFİL + DURUM
async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';

  const {data}=await sb.from('profiles').select('*').eq('id',me.id).single();
  myProfile=data;

  await loadProfiles();
  await loadTasks();
  await loadTeams();
}

// KULLANICI LİSTESİ FIX
async function loadProfiles(){
  const {data}=await sb.from('profiles').select('*');
  profiles=data||[];

  profiles.forEach(p=>{
    if(!userStatus[p.id]) userStatus[p.id]='online';
  });

  renderUsers();
}

function renderUsers(){
  document.getElementById('user-list').innerHTML=`
  <table class="user-table">
    <thead>
      <tr><th>Ad</th><th>Email</th><th>Durum</th></tr>
    </thead>
    <tbody>
      ${profiles.map(p=>`
        <tr>
          <td>${p.full_name}</td>
          <td>${p.email || '-'}</td>
          <td>
            <select onchange="setStatus('${p.id}',this.value)">
              <option ${userStatus[p.id]=='online'?'selected':''}>online</option>
              <option ${userStatus[p.id]=='offline'?'selected':''}>offline</option>
              <option ${userStatus[p.id]=='meeting'?'selected':''}>toplantı</option>
              <option ${userStatus[p.id]=='break'?'selected':''}>mola</option>
            </select>
          </td>
        </tr>
      `).join('')}
    </tbody>
  </table>`;
}

function setStatus(id,val){
  userStatus[id]=val;
}

// TASK FIX
async function loadTasks(){
  const {data}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
  tasks=data||[];
  renderTasks();
}

function renderTasks(){
  document.getElementById('task-list').innerHTML=
    tasks.map(t=>`<div class="task-card">${t.title}</div>`).join('');
}

async function addTask(){
  const title=document.getElementById('f-title').value;
  if(!title) return alert('Başlık gerekli');

  await sb.from('tasks').insert({
    title,
    user_id:me.id
  });

  await loadTasks(); // ANINDA REFRESH
  closeModal('taskModal');
}

// YORUM FIX
async function addComment(taskId){
  const inp=document.getElementById('ci-'+taskId);
  const content=inp.value.trim();
  if(!content) return;

  await sb.from('comments').insert({
    task_id:taskId,
    content,
    user_id:me.id
  });

  inp.value='';
  await loadTasks(); // REFRESH
}

// TEAM FIX (kullanıcıları getir)
async function loadTeams(){
  const {data}=await sb.from('teams').select('*');
  teams=data||[];
  renderTeams();
}

function renderTeams(){
  document.getElementById('team-list').innerHTML=
    teams.map(t=>`
      <div class="team-card">
        <b>${t.name}</b><br>
        Kullanıcılar:
        ${profiles.map(p=>`<div>${p.full_name}</div>`).join('')}
      </div>
    `).join('');
}

init();
</script>
