<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İş Takip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e4; padding: 20px 14px; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
  .main { margin-left: 220px; padding: 24px; flex: 1; }
  .sidebar-logo { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 24px; padding: 4px 10px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; margin-bottom: 4px; transition: background 0.15s; }
  .nav-item.active { background: #f0f0ea; color: #1a1a1a; font-weight: 500; }
  .nav-item:hover { background: #f0f0ea; }
  .separator { height: 1px; background: #e8e8e4; margin: 10px 0; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .btn-primary { background: #1a1a1a; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-primary:hover { background: #333; }
  .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 14px; }
  .stat-label { font-size: 11px; color: #999; margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 12px; cursor: pointer; color: #666; transition: all 0.15s; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: transparent; }
  .task-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; }
  .task-card:hover { border-color: #ccc; }
  .task-card.expanded { border-color: #999; }
  .task-top { display: flex; align-items: flex-start; gap: 10px; }
  .task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
  .task-check.done { background: #639922; border-color: #639922; color: white; }
  .task-info { flex: 1; cursor: pointer; }
  .task-title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 5px; }
  .task-title.done { text-decoration: line-through; color: #aaa; }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .deadline { font-size: 12px; color: #888; }
  .deadline.urgent { color: #A32D2D; font-weight: 600; }
  .task-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
  .icon-btn { background: none; border: 1px solid #e0e0e0; border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: #555; transition: background 0.12s; }
  .icon-btn:hover { background: #f5f5f0; }
  .task-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0ea; display: none; }
  .task-detail.show { display: block; }
  .comment-section { margin-top:10px; }
  .comment-section textarea { width: 100%; padding:8px; border-radius:6px; border:1px solid #ddd; resize:none; margin-bottom:6px; }
  .comment-section button { font-size:13px; padding:6px 12px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 11px 18px; border-radius: 9px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; padding: 50px; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">İş Takip</div>
    <div class="nav-item active" id="nav-tasks" onclick="showView('tasks')">📋 Görevler</div>
    <div class="separator"></div>
    <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;padding:0 10px;margin-bottom:6px;">Bağlantı</div>
    <div id="conn-status" style="font-size:12px;color:#aaa;padding:0 10px;">Bağlanıyor...</div>
  </div>

  <div class="main">
    <div id="view-tasks">
      <div class="header">
        <h1>Görevler</h1>
        <button class="btn-primary" onclick="openModal('taskModal')">+ Yeni Görev</button>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-label">Toplam</div><div class="stat-val" id="s-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Devam ediyor</div><div class="stat-val" id="s-active">—</div></div>
        <div class="stat-card"><div class="stat-label">Tamamlanan</div><div class="stat-val" id="s-done">—</div></div>
      </div>
      <div id="task-list"><div class="empty">Yükleniyor...</div></div>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2>Yeni Görev</h2>
    <div class="form-group"><label class="form-label">Başlık</label><input class="form-input" id="f-title" placeholder="Görev adı..." /></div>
    <div class="form-group"><label class="form-label">Not</label><textarea class="form-input" id="f-note" rows="2" placeholder="Açıklama..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('taskModal')">İptal</button>
      <button class="btn-primary" onclick="addTask()">Ekle</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cvgxwpxvtxedajzrnand.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cJp6p5cSfJwOynI5kCK_2Q_EPP4bijp';
const TG_TOKEN = '8632000680:AAGZ_vVX8KJCsU7obXp63zgcNYmk4_5JNTs';

let sb, tasks = [], expandedId = null;

async function init() {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { error } = await sb.from('tasks').select('id').limit(1);
    if (error) throw error;
    document.getElementById('conn-status').innerHTML = '<span style="color:#3B6D11;">● Bağlandı</span>';
    await loadTasks();
  } catch(e) {
    document.getElementById('conn-status').innerHTML = '<span style="color:#A32D2D;">● Bağlantı hatası</span>';
    document.getElementById('task-list').innerHTML = '<div class="empty">Veritabanına bağlanılamadı.</div>';
  }
}

async function loadTasks() {
  const { data } = await sb.from('tasks').select('*').order('created_at', { ascending: false });
  tasks = data || []; renderTasks();
}

function renderTasks() {
  if (!tasks.length) { document.getElementById('task-list').innerHTML='<div class="empty">Görev bulunamadı</div>'; return; }
  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-active').textContent = tasks.filter(t=>t.status!=='Tamamlandı').length;
  document.getElementById('s-done').textContent = tasks.filter(t=>t.status==='Tamamlandı').length;

  document.getElementById('task-list').innerHTML = tasks.map(t=>`
    <div class="task-card ${expandedId===t.id?'expanded':''}">
      <div class="task-top">
        <div class="task-check ${t.status==='Tamamlandı'?'done':''}" onclick="toggleDoneStatus('${t.id}')">
          ${t.status==='Tamamlandı'?'✓':''}
        </div>
        <div class="task-info" onclick="toggleExpand('${t.id}')">
          <div class="task-title ${t.status==='Tamamlandı'?'done':''}">${t.title}</div>
          <div class="task-meta">
            <span class="badge">${t.status}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="editStatus('${t.id}','Beklemede')">Beklemede</button>
          <button class="icon-btn" onclick="editStatus('${t.id}','Tamamlandı')">Tamamlandı</button>
          <button class="icon-btn" style="color:#A32D2D;" onclick="editStatus('${t.id}','İptal')">İptal</button>
          <button class="icon-btn" onclick="toggleComment('${t.id}')">💬 Yorum</button>
        </div>
      </div>
      <div class="task-detail ${expandedId===t.id?'show':''}">
        <div class="detail-note">${t.note||'Henüz not eklenmedi.'}</div>
        <div class="comment-section" id="comment-${t.id}" style="display:none;">
          <textarea id="c-text-${t.id}" rows="2" placeholder="Yorum yaz...">${t.comment||''}</textarea>
          <button class="btn-primary" onclick="saveComment('${t.id}')">Kaydet</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Görev detayını aç/kapa
function toggleExpand(id) { expandedId = expandedId===id?null:id; renderTasks(); }

// Görev statüsünü güncelle
async function editStatus(id, status) {
  await sb.from('tasks').update({ status }).eq('id', id);
  showToast(`Görev durumu "${status}" olarak güncellendi ✓`);
  await loadTasks();
}

// Yorum alanını göster/gizle
function toggleComment(id) {
  const el = document.getElementById('comment-' + id);
  if(el) el.style.display = el.style.display==='none'?'block':'none';
}

// Yorum kaydet
async function saveComment(id) {
  const text = document.getElementById('c-text-' + id).value;
  await sb.from('tasks').update({ comment: text }).eq('id', id);
  showToast('Yorum kaydedildi ✓');
  await loadTasks();
}

// Toggle "Tamamlandı" simgesi (check)
async function toggleDoneStatus(id) {
  const t = tasks.find(x => x.id===id);
  const newStatus = t.status==='Tamamlandı'?'Beklemede':'Tamamlandı';
  await editStatus(id, newStatus);
}

// Yeni görev ekleme
async function addTask() {
  const title = document.getElementById('f-title').value.trim();
  if(!title) { alert('Görev başlığı gerekli!'); return; }
  await sb.from('tasks').insert({ title, note: document.getElementById('f-note').value, status:'Beklemede' });
  closeModal('taskModal');
  document.getElementById('f-title').value=''; document.getElementById('f-note').value='';
  showToast('Görev eklendi ✓'); await loadTasks();
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showView(v) {
  document.getElementById('view-tasks').style.display=v==='tasks'?'block':'none';
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>
