<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>İş Takip</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f5f5f0}
.auth-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.auth-box{background:#fff;padding:30px;border-radius:10px;width:320px}
.btn{padding:10px;width:100%;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth-screen" class="auth-wrap">
  <div class="auth-box">
    <h3>Giriş</h3>
    <input id="l-email" placeholder="email" /><br><br>
    <input id="l-pass" type="password" placeholder="şifre"/><br>
    <label><input type="checkbox" id="remember-me"> Beni hatırla</label>
    <button class="btn" onclick="doLogin()">Giriş Yap</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none;padding:20px;">
  <h2>Görevler</h2>

  <input id="f-title" placeholder="Yeni görev"/>
  <button onclick="addTask()">Ekle</button>

  <div id="task-list"></div>

  <h2>Kullanıcılar</h2>
  <div id="user-list"></div>

  <h2>Ekipler</h2>
  <div id="team-list"></div>

  <button onclick="doLogout()">Çıkış</button>
</div>

<script>
const SB_URL='https://cvgxwpxvtxedajzrnand.supabase.co';
const SB_KEY='sb_publishable_cJp6p5cSfJwOynI5kCK_2Q_EPP4bijp';

let sb,me=null,myProfile=null;
let tasks=[],profiles=[],teams=[];

// INIT
async function init(){
  sb=supabase.createClient(SB_URL,SB_KEY);

  const remember = localStorage.getItem("remember_me");

  if(remember==='1'){
    const {data:{session}}=await sb.auth.getSession();
    if(session){
      me=session.user;
      await showApp();
    } else showAuth();
  } else showAuth();

  sb.auth.onAuthStateChange(async(_,s)=>{
    if(s){
      me=s.user;
      await showApp();
    }else{
      me=null;
      showAuth();
    }
  });
}

// LOGIN
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;

  const remember=document.getElementById('remember-me').checked;

  if(remember) localStorage.setItem('remember_me','1');
  else localStorage.removeItem('remember_me');

  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error) alert("Hatalı giriş");
}

// LOGOUT
async function doLogout(){
  await sb.from('profiles').update({status:'offline'}).eq('id',me.id);
  await sb.auth.signOut();
  localStorage.removeItem('remember_me');
  location.reload();
}

// SHOW APP
async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';

  const {data}=await sb.from('profiles').select('*').eq('id',me.id).single();
  myProfile=data;

  await sb.from('profiles').update({status:'online'}).eq('id',me.id);

  await Promise.all([
    loadTasks(),
    loadProfiles(),
    loadTeams()
  ]);

  startRealtime();
}

function showAuth(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}

// REALTIME
function startRealtime(){
  sb.channel('tasks')
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadTasks())
    .subscribe();

  sb.channel('profiles')
    .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>loadProfiles())
    .subscribe();
}

// TASK
async function loadTasks(){
  const {data}=await sb.from('tasks').select('*').order('created_at',{ascending:false});
  tasks=data||[];
  renderTasks();
}

function renderTasks(){
  const wrap=document.getElementById('task-list');
  wrap.innerHTML=tasks.map(t=>`
    <div style="background:#fff;margin:5px;padding:10px;border-radius:6px;">
      <b>${t.title}</b>
      <div>
        <input id="ci-${t.id}" placeholder="yorum"/>
        <button onclick="addComment('${t.id}')">Gönder</button>
      </div>
    </div>
  `).join('');
}

async function addTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title) return alert("Başlık gerekli");

  await sb.from('tasks').insert({title,user_id:me.id});
  document.getElementById('f-title').value='';
  await loadTasks();
}

// COMMENT
async function addComment(taskId){
  const inp=document.getElementById('ci-'+taskId);
  const val=inp.value.trim();
  if(!val) return;

  await sb.from('comments').insert({
    task_id:taskId,
    content:val,
    user_id:me.id,
    user_email:me.email
  });

  inp.value='';
}

// USERS
async function loadProfiles(){
  const {data}=await sb.from('profiles').select('*');
  profiles=data||[];
  renderUsers();
}

function renderUsers(){
  const wrap=document.getElementById('user-list');

  wrap.innerHTML=`
  <table border="1" cellpadding="6">
    <tr><th>Ad</th><th>Email</th><th>Rol</th><th>Durum</th></tr>
    ${profiles.map(p=>`
      <tr>
        <td>${p.full_name||''}</td>
        <td>${p.email||p.id}</td>
        <td>${p.role||'member'}</td>
        <td>
          <select onchange="setStatus('${p.id}',this.value)">
            <option value="online" ${p.status==='online'?'selected':''}>online</option>
            <option value="offline" ${p.status==='offline'?'selected':''}>offline</option>
            <option value="break" ${p.status==='break'?'selected':''}>mola</option>
            <option value="meeting" ${p.status==='meeting'?'selected':''}>toplantı</option>
          </select>
        </td>
      </tr>
    `).join('')}
  </table>`;
}

async function setStatus(id,val){
  await sb.from('profiles').update({status:val}).eq('id',id);
}

// TEAMS
async function loadTeams(){
  const {data}=await sb.from('teams').select('*');
  teams=data||[];
  renderTeams();
}

function renderTeams(){
  const wrap=document.getElementById('team-list');

  wrap.innerHTML=teams.map(t=>`
    <div style="background:#fff;padding:10px;margin:5px;">
      <b>${t.name}</b>
    </div>
  `).join('');
}

init();
</script>

</body>
</html>
